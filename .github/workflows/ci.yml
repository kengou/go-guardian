# Core CI pipeline for go-guardian MCP server.
#
# Runs on every PR and every push to main.
# Gates: go build, go vet, go test -race
# This workflow name ("ci") is required by the branch ruleset's status check.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: mcp-server/go.mod
          cache-dependency-path: mcp-server/go.sum

      - name: Build
        run: go build -ldflags="-s -w" ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage
          path: mcp-server/coverage.out
          retention-days: 14
