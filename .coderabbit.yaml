# CodeRabbit configuration for go-guardian
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: "en-US"

reviews:
  profile: "chill"
  review_status: true
  high_level_summary: true
  collapse_walkthrough: false
  request_changes_workflow: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    # Trigger reviews on Renovate/Dependabot PRs via label match.
    # Renovate is configured to add the "dependencies" label to all its PRs.
    labels:
      - "dependencies"

  # Custom guidance for dependency update PRs from Renovate/Dependabot.
  path_instructions:
    - path: "go.mod"
      instructions: |
        This is a dependency update. Check:
        1. The updated module is not on the AVOID list in the vuln cache.
        2. No new indirect dependencies introduce known CVEs.
        3. The go directive version is consistent with the Dockerfile Go version.
    - path: "go.sum"
      instructions: "Verify checksums look consistent with go.mod changes. No manual edits expected."
    - path: ".github/workflows/**"
      instructions: |
        For action version bumps: confirm the new SHA/tag is from the official action repo.
        For Go version bumps: confirm it matches the go directive in go.mod and the Dockerfile.

chat:
  auto_reply: true
