# go-guardian golangci-lint template
# Copy to your project root as .golangci.yml and adjust as needed.
# Generated by go-guardian — version 0.1.0

run:
  timeout: 5m
  go: "1.26"
  # Set to true to use all CPUs
  concurrency: 4

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    # --- Correctness ---
    - errcheck        # Check all error returns are handled
    - govet           # go vet checks (shadow, printf, etc.)
    - staticcheck     # Advanced static analysis (SA*, ST*, QF* checks)
    - ineffassign     # Detect assignments to variables never used after
    - unused          # Report unused code
    - bodyclose       # Check HTTP response bodies are closed
    - nilerr          # Check for returning nil error with non-nil value
    - rowserrcheck    # Check sql.Rows.Err() is checked
    - sqlclosecheck   # Check sql.Rows/Stmt.Close() is called
    - noctx           # Find http requests without context.Context

    # --- Security ---
    - gosec           # Security checks (G101-G601)
    - bidichk         # Check for dangerous unicode bidirectional characters

    # --- Style and Idioms ---
    - revive          # Fast, configurable, replacement for golint
    - gofmt           # Check gofmt formatting
    - goimports       # Check import grouping and formatting
    - misspell        # Find common spelling mistakes in comments
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Find unused function parameters
    - gocritic        # Various Go code issues

    # --- Error Handling ---
    - wrapcheck       # Check errors from external packages are wrapped
    - errname         # Check error types are named correctly (ErrXxx or XxxError)

    # --- Concurrency ---
    - govet           # includes -shadow, -copylock checks

linters-settings:
  errcheck:
    # Report assignments to blank identifier: _ = foo()
    check-blank: true
    # Check type assertions: x.(T) without ok
    check-type-assertions: true

  govet:
    enable-all: true
    disable:
      - fieldalignment  # Too noisy for most projects

  staticcheck:
    checks:
      - "all"
      - "-ST1000"  # Allow missing package docs
      - "-ST1020"  # Allow missing exported function docs
      - "-ST1021"  # Allow missing exported type docs
      - "-ST1022"  # Allow missing exported var docs

  revive:
    severity: warning
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
      - name: package-comments
        disabled: true  # Handled by staticcheck
      - name: unused-parameter
        severity: warning
      - name: unreachable-code
        severity: error
      - name: context-as-argument
        severity: error
        arguments:
          - allowTypesBefore: "*testing.T,*testing.B"
      - name: context-keys-type
        severity: error
      - name: error-return
        severity: error
      - name: error-strings
        severity: error  # Lowercase, no punctuation
      - name: error-naming
        severity: error
      - name: if-return
        severity: warning
      - name: increment-decrement
        severity: warning

  gosec:
    excludes:
      - G104  # Suppress: errors unhandled (handled by errcheck)
    config:
      G306: "0600"  # File permissions

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - commentedOutCode
      - whyNoLint
      - hugeParam  # Too noisy without benchmarks

  wrapcheck:
    ignorePackageGlobs:
      - "encoding/*"
      - "github.com/pkg/*"

  misspell:
    locale: US

  goimports:
    local-prefixes: "github.com/go-guardian"

issues:
  # Maximum number of issues with the same text. 0 = unlimited.
  max-same-issues: 3

  exclude-rules:
    # Test files: relax some rules
    - path: "_test\\.go"
      linters:
        - errcheck
        - wrapcheck
        - gosec
        - unparam

    # Generated files: skip entirely
    - path: "\\.pb\\.go"
      linters:
        - all

    # Main package: allow unused params in main()
    - path: "main\\.go"
      linters:
        - unparam

  exclude-use-default: false

  # Fix fixable issues automatically with --fix flag
  fix: false
