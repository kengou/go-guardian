# go-guardian golangci-lint template — v2 format
# Copy to your project root as .golangci.yml and adjust as needed.
# Generated by go-guardian — version 0.1.0

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  concurrency: 4
  # go version is read automatically from go.mod — no need to set it here

linters:
  default: none
  enable:
    # --- Correctness ---
    - errcheck              # Check all error returns are handled
    - govet                 # go vet checks (shadow, printf, etc.)
    - staticcheck           # Advanced static analysis (SA*, ST*, QF* checks)
    - ineffassign           # Detect assignments to variables never used after
    - unused                # Report unused code
    - bodyclose             # Check HTTP response bodies are closed
    - nilerr                # Check for returning nil error with non-nil value
    - rowserrcheck          # Check sql.Rows.Err() is checked
    - sqlclosecheck         # Check sql.Rows/Stmt.Close() is called
    - noctx                 # Find http requests without context.Context
    - copyloopvar           # Detect loop variable capture issues (Go 1.22+)
    - durationcheck         # Detect time.Duration multiplication bugs
    - errorlint             # Catch errors.Is/As/As misuse and non-wrapped comparisons
    - gocheckcompilerdirectives  # Validate //go:build and other compiler directives
    - intrange              # Enforce range-over-int idiom (Go 1.22+)
    - predeclared           # Detect shadowing of predeclared identifiers

    # --- Security ---
    - gosec                 # Security checks (G101-G601)
    - bidichk               # Check for dangerous unicode bidirectional characters
    - forbidigo             # Forbid CVE-vulnerable packages and deprecated APIs

    # --- Style and Idioms ---
    - misspell              # Find common spelling mistakes in comments
    - unconvert             # Remove unnecessary type conversions
    - unparam               # Find unused function parameters
    - gocritic              # Various Go code issues
    - sloglint              # Enforce slog API usage correctness
    - containedctx          # Detect context.Context embedded in structs
    - dupword               # Find duplicate words in comments and strings
    - goconst               # Find repeated string literals that could be constants
    - nolintlint            # Enforce specific //nolint:<linter> directives
    - nosprintfhostport     # Detect fmt.Sprintf host:port construction (use net.JoinHostPort)
    - perfsprint            # Replace fmt.Sprintf with faster string conversion alternatives
    - usestdlibvars         # Enforce use of stdlib constants (http.MethodGet, etc.)
    - whitespace            # Detect unnecessary blank lines at start/end of blocks

    # --- Error Handling ---
    - errname               # Check error types are named correctly (ErrXxx or XxxError)

  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true

    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too noisy for most projects

    staticcheck:
      checks:
        - "all"
        - "-ST1000"  # Allow missing package docs
        - "-ST1020"  # Allow missing exported function docs
        - "-ST1021"  # Allow missing exported type docs
        - "-ST1022"  # Allow missing exported var docs

    forbidigo:
      forbid:
        - pattern: ^ioutil\..*$
          msg: "use io and os packages instead of deprecated ioutil"
        - pkg: ^gopkg\.in/square/go-jose\.v2$
          msg: "CVE-vulnerable; use github.com/go-jose/go-jose/v3 or later"
        - pkg: ^github\.com/coreos/go-oidc$
          msg: "depends on CVE-vulnerable go-jose v2; use github.com/coreos/go-oidc/v3"

    usestdlibvars:
      http-method: true
      http-status-code: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true

    nolintlint:
      require-specific: true
      allow-unused: false

    goconst:
      min-occurrences: 5

    gosec:
      excludes:
        - G104  # Suppress: errors unhandled (handled by errcheck)
      config:
        G306: "0600"  # File permissions

    gocritic:
      enabled-checks:
        - boolExprSimplify
        - preferFilepathJoin
        - yodaStyleExpr
        - appendAssign
        - equalFold
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - commentedOutCode
        - whyNoLint
        - hugeParam  # Too noisy without benchmarks

    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kengou/go-guardian

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files: relax some rules
      - linters:
          - bodyclose
          - errcheck
          - gosec
          - unparam
        path: _test\.go
      # Generated protobuf files: skip entirely
      - linters:
          - all
        path: \.pb\.go
      # Main package: allow unused params in main()
      - linters:
          - unparam
        path: main\.go
