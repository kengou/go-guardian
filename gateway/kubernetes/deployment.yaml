apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-guardian
  labels:
    app: go-guardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-guardian
  template:
    metadata:
      labels:
        app: go-guardian
    spec:
      containers:
      - name: agentgateway
        image: ghcr.io/agentgateway/agentgateway:latest
        args: ["--config", "/etc/go-guardian/config.yaml"]
        ports:
        - name: mcp
          containerPort: 3000
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: NVD_API_KEY
          valueFrom:
            secretKeyRef:
              name: go-guardian-secrets
              key: nvd-api-key
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: go-guardian-secrets
              key: github-token
              optional: true
        volumeMounts:
        - name: config
          mountPath: /etc/go-guardian
          readOnly: true
        - name: openapi
          mountPath: /etc/go-guardian/openapi
          readOnly: true

      - name: go-guardian-mcp
        # Build this image from the mcp-server/ directory:
        #   make -C mcp-server docker-build                              (local, current platform)
        #   REGISTRY=ghcr.io/myorg make -C mcp-server docker-push-multi (multi-platform, push)
        image: go-guardian-mcp:latest
        args: ["--db", "/data/guardian.db"]
        env:
        - name: NVD_API_KEY
          valueFrom:
            secretKeyRef:
              name: go-guardian-secrets
              key: nvd-api-key
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: go-guardian-secrets
              key: github-token
              optional: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: data
          mountPath: /data

      volumes:
      - name: config
        configMap:
          name: go-guardian-config
          items:
          - key: config.yaml
            path: config.yaml
      - name: openapi
        configMap:
          # Create this ConfigMap separately — see the comment in configmap.yaml.
          # kubectl create configmap go-guardian-openapi \
          #   --from-file=github-advisories.json=gateway/openapi/github-advisories.json \
          #   --from-file=nvd.json=gateway/openapi/nvd.json \
          #   --from-file=go-vuln.json=gateway/openapi/go-vuln.json
          name: go-guardian-openapi
      - name: data
        persistentVolumeClaim:
          # A PVC named "go-guardian-data" must exist before deploying.
          # Example: kubectl apply -f pvc.yaml
          # Minimum recommended: 1Gi, accessMode ReadWriteOnce.
          claimName: go-guardian-data
